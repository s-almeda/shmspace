<!DOCTYPE html>
<html lang="en">
<head>
  <title>shmspace - you've got a message!</title>

  <link href="https://fonts.googleapis.com/css?family=Fira+Sans" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/xp.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="/css/styles.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: rgb(22, 19, 19);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .window {
      width: 95vw;
      height: 95vh;
      min-width: 320px;
      max-width: none;
      min-height: 300px;
      margin: 10vh;
    }

    .window-body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100% - 30px);
      padding: 10px;
      box-sizing: border-box;
      overflow: visible;
    }

    .card-container {
      perspective: 1000px;
      display: flex;
      margin-top: calc(10vh + 50px);
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .card-flipper {
      position: relative;
      width: auto;
      height: auto;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card-flipper:hover {
      transform: scale(1.05);
    }

    .card-flipper.flipped {
      transform: rotateY(180deg);
    }

    .card-flipper.flipped:hover {
      transform: scale(1.03) rotateY(180deg);
    }

    .card-front,
    .card-back {
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      transform: rotateY(180deg);
      background-color: white;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' result='noise' seed='2'/%3E%3CfeColorMatrix in='noise' type='saturate' values='0.1'/%3E%3CfeBlend in='SourceGraphic' in2='noise' mode='overlay'/%3E%3C/filter%3E%3Crect width='400' height='400' fill='%23F8F7F7' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.7));
    }

    .card {
      max-height: 65vh;
      width: auto;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.7));
      cursor: pointer;
      display: block;
    }

    .click-to-flip {
      position: absolute;
      bottom: 3%;
      right: 10%;
      max-height: 8vh;
      width: auto;
      z-index: 10;
      animation: floatIn 1.5s ease-out 0s forwards, wiggleOnce 3s ease-in-out 2s infinite;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .click-to-flip:hover {
      transform: scale(1.4);
      animation: floatIn 1s ease-out 0s forwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wiggle {
      0%, 10%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      25% {
        transform: translateY(-2px) rotate(-1deg);
      }
      50% {
        transform: translateY(-3px) rotate(1deg);
      }
      75% {
        transform: translateY(-2px) rotate(-1deg);
      }
    }

    @keyframes wiggleOnce {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      3%, 9% {
        transform: translateY(-4px) rotate(-1deg);
      }
      5% {
        transform: translateY(-6px) rotate(1deg);
      }
      12%, 100% {
        transform: translateY(0) rotate(0deg);
      }
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="title-bar" style="height:28px;">
      <div class="title-bar-text">
        <img src="/images/document.ico" alt="Document Logo" style="height: 25px; vertical-align: middle; margin-right: 8px;">
        you've got a message!
      </div>
      <!-- <div class="title-bar-controls">
        <label>
          <a href="/"><button aria-label="Minimize"></button></a>
          <a href="/"><button aria-label="Close"></button></a>
        </label>
      </div> -->
    </div>

    <div class="window-body">
      <div class="card-container">
        <div class="card-flipper" id="cardFlipper">
          <div class="card-front">
            <img src="/images/christmascard.png" alt="Christmas Message Card" class="card">
            <img src="/images/clicktoflip.png" alt="Click to flip" class="click-to-flip">
          </div>
          <div class="card-back">
            <div style="width: 100%; height: 100%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cardFlipper = document.getElementById('cardFlipper');
    
    cardFlipper.addEventListener('click', () => {
      cardFlipper.classList.toggle('flipped');
    });
  </script>
</body>
</html>
