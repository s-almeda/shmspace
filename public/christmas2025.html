<!DOCTYPE html>
<html lang="en">
<head>
  <title>shmspace - you've got a message!</title>

  <link href="https://fonts.googleapis.com/css?family=Fira+Sans" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/xp.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="/css/styles.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: rgb(22, 19, 19);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .window {
      width: 95vw;
      height: 95vh;
      min-width: 320px;
      max-width: none;
      min-height: 300px;
      margin: 10vh;
    }

    .window-body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100% - 30px);
      padding: 10px;
      box-sizing: border-box;
      overflow: visible;
    }

    .card-container {
      perspective: 1000px;
      display: flex;
      margin-top: calc(10vh + 50px);
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .card-flipper {
      position: relative;
      width: auto;
      height: auto;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .card-flipper:hover {
      transform: scale(1.05);
    }

    .card-flipper.flipped {
      transform: rotateY(180deg);
    }

    .card-flipper.flipped:hover {
      transform: scale(1.03) rotateY(180deg);
    }

    .card-front,
    .card-back {
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .card-back {
      transform: rotateY(180deg);
      background-color: white;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' result='noise' seed='2'/%3E%3CfeColorMatrix in='noise' type='saturate' values='0.1'/%3E%3CfeBlend in='SourceGraphic' in2='noise' mode='overlay'/%3E%3C/filter%3E%3Crect width='400' height='400' fill='%23F8F7F7' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-attachment: fixed;
      position: absolute;
      top: 0;
      left: 0;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.7));
      overflow-y: auto;
      padding: 25px;
      box-sizing: border-box;
    }

    .card {
      max-height: 65vh;
      width: auto;
      filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.7));
      cursor: pointer;
      display: block;
    }

    .click-to-flip {
      position: absolute;
      bottom: 3%;
      right: 10%;
      max-height: 8vh;
      width: auto;
      z-index: 10;
      animation: floatIn 1.5s ease-out 0s forwards, wiggleOnce 3s ease-in-out 2s infinite;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .click-to-flip:hover {
      transform: scale(1.4);
      animation: floatIn 1s ease-out 0s forwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wiggle {
      0%, 10%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      25% {
        transform: translateY(-2px) rotate(-1deg);
      }
      50% {
        transform: translateY(-3px) rotate(1deg);
      }
      75% {
        transform: translateY(-2px) rotate(-1deg);
      }
    }

    @keyframes wiggleOnce {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      3%, 9% {
        transform: translateY(-4px) rotate(-1deg);
      }
      5% {
        transform: translateY(-6px) rotate(1deg);
      }
      12%, 100% {
        transform: translateY(0) rotate(0deg);
      }
    }

    /* Hide click-to-flip when card is flipped */
    .card-flipper.flipped .click-to-flip {
      display: none;
    }

    /* Mobile styles */
    @media (max-width: 568px) {
      body {
        justify-content: flex-start;
        align-items: flex-start;
        padding-top: 10px;
      }

      .window {
        width: 98vw;
        height: auto;
        max-height: 85vh;
        margin: auto;
        min-width: unset;
        min-height: unset;
      }

      .window-body {
        height: auto;
      }

      .title-bar {
        height: 20px !important;
      }

      .title-bar-text {
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: wrap;
        padding: 0px;
        margin: 0px;
      }

      .title-bar-text img {
        height: 18px !important;
        margin-right: 4px !important;
      }

      .card-container {
        margin-top: 20px;
        height: auto;
      }

      .card {
        max-height: 55vh;
      }

      .click-to-flip {
        max-height: 6vh;
      }

      .card-back {
        padding: 12px;
        font-size: 12px;
        font-family: 'Comic Sans MS', 'Arial', sans-serif !important;
      }
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="title-bar" style="height:28px;">
      <div class="title-bar-text">
        <img src="/images/mail.webp" alt="mail Logo" style="height: 25px; vertical-align: middle; margin-right: 8px;">
        <span id="titleText">you've got a message!</span>
      </div>
      <!-- <div class="title-bar-controls">
        <label>
          <a href="/"><button aria-label="Minimize"></button></a>
          <a href="/"><button aria-label="Close"></button></a>
        </label>
      </div> -->
    </div>

    <div class="window-body">
      <div class="card-container">
        <div class="card-flipper" id="cardFlipper">
          <div class="card-front">
            <img src="/images/christmascard.png" alt="Christmas Message Card" class="card">
            <img src="/images/clicktoflip.png" alt="Click to flip" class="click-to-flip">
          </div>
          <div class="card-back" id="messageContent" style="text-align: left; font-family: 'Comic Sans MS', cursive; font-size: 14px; line-height: 1.4; white-space: pre-wrap;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cardFlipper = document.getElementById('cardFlipper');
    const messageContent = document.getElementById('messageContent');
    
    // Get URL parameter
    function getMessageRecipient() {
      const params = new URLSearchParams(window.location.search);
      return params.get('for') || 'Default';
    }
    
    // Load and display message
    async function loadMessage() {
      try {
        const response = await fetch('/christmas2025messages.md');
        const text = await response.text();
        
        const recipient = getMessageRecipient();
        const titleText = document.getElementById('titleText');
        
        // Update title if we have a specific person
        if (recipient !== 'Default') {
          titleText.textContent = `hey ${recipient}! you've got a message!`;
        }
        
        // Parse markdown to find the message for this person
        const lines = text.split('\n');
        let messageText = '';
        let foundSection = false;
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          
          // Look for the section matching the recipient
          if (line.includes(`## For ${recipient}`)) {
            foundSection = true;
            i++; // Skip the header line
            
            // Collect all lines until the next section or end
            while (i < lines.length && !lines[i].startsWith('##')) {
              messageText += lines[i] + '\n';
              i++;
            }
            break;
          }
        }
        
        // If no matching section found, use Default
        if (!foundSection) {
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.includes('## For Default')) {
              i++;
              while (i < lines.length && !lines[i].startsWith('##')) {
                messageText += lines[i] + '\n';
                i++;
              }
              break;
            }
          }
        }
        
        // Clean up and display
        messageText = messageText.trim();
        messageContent.textContent = messageText;
        
      } catch (error) {
        console.error('Error loading message:', error);
        messageContent.textContent = 'Merry Christmas!\n\nThanks for looking at my art.\n\nYour friend,\nShm';
      }
    }
    
    cardFlipper.addEventListener('click', () => {
      cardFlipper.classList.toggle('flipped');
    });
    
    // Load message on page load
    document.addEventListener('DOMContentLoaded', loadMessage);
  </script>
</body>
</html>
