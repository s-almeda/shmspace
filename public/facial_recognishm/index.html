<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>recognizing my self</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css" />
  <link rel="stylesheet" href="/facial_recognishm/css/recognize_me.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="window main-window">
    <div class="title-bar">
      <div class="title-bar-text">
        <!-- <img src="./images/question_mark.ico" alt="question mark Logo" style="height: 25px; vertical-align: middle; margin-right: 8px;"> -->
        <span id="titleText">recognizing my self</span>
      </div>

      <div class="title-bar-controls">
        <a href="/"><button aria-label="Close"></button></a>
      </div>
    </div>

    <div class="window-body">
      <!-- always-visible start state -->
      <div id="startScreen">
        <button id="startBtn"> let them see you </button>
      </div>

      <!-- error state -->
      <div id="errorScreen">
        <p>camera access was denied.</p>
        <button id="retryBtn">try again</button>
      </div>

      <!-- webcam feed -->
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="faceCanvas"></canvas>

      <!-- analysis panel (right side, hidden until camera starts) -->
      <div id="analysisPanel">
        <fieldset>
          <!-- <legend style="font-style: italic;">what is seen</legend> -->
          <div id="checkboxGroup">
            <div class="field-row disabled">
              <input id="check-race" type="checkbox">
              <label for="check-race">[R]ace</label>
              <span class="result-value" id="result-race"></span>
            </div>
            <div class="field-row disabled">
              <input id="check-age" type="checkbox">
              <label for="check-age">[A]ge</label>
              <span class="result-value" id="result-age"></span>
            </div>
            <div class="field-row disabled">
              <input id="check-gender" type="checkbox">
              <label for="check-gender">[G]ender</label>
              <span class="result-value" id="result-gender"></span>
            </div>
            <div class="field-row disabled">
              <input id="check-emotion" type="checkbox">
              <label for="check-emotion">[E]motion</label>
              <span class="result-value" id="result-emotion"></span>
            </div>
            <div class="field-row">
              <input id="check-facemesh" type="checkbox" checked>
              <label for="check-facemesh">[F]acemesh</label>
            </div>
            <div class="field-row">
              <input id="check-bbox" type="checkbox" checked>
              <label for="check-bbox">[B]ounding box</label>
            </div>
          </div>
          <div class="field-row">
            <div class="inner-scroll">
              <fieldset>
                  <legend>detected:</legend>
                  <textarea id="detectionOutput">...</textarea>
              </fieldset>
            </div>
          </div>

        </fieldset>
      </div>

      <div id="dialogueOverlay">
            <menu role="tablist">
                <button role="tab" aria-selected="true" aria-controls="dialogue-panel" contenteditable="true">
                character name
                </button>
            </menu>
            <article role="tabpanel" id="dialogue-panel" contenteditable="true">
                dialogue text goes here...
            </article>
        </div>
    </div>
  </div>

  <script type="module">
    import { encode, decode } from 'https://esm.sh/blurhash@2.0.5';
    /* tf and faceapi are globals loaded via <script defer> in <head> */

      const RACE_CLASSES = ['White', 'Black', 'Asian', 'Hispanic_Latino', 'Middle_Eastern'];

      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights'),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights'),
        faceapi.nets.ageGenderNet.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights'),
        faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights'),
      ]);

      const raceModel = await tf.loadGraphModel('/facial_recognishm/face_model/model.json');

      const inferCanvas = document.createElement('canvas');
      inferCanvas.width  = 224;
      inferCanvas.height = 224;
      const inferCtx = inferCanvas.getContext('2d');

      let raceInterval = null;

      const faceCanvas = document.getElementById('faceCanvas');

      // ── Smooth face-overlay (lerp between detections) ──────────────
      let faceTarget  = null;  // latest geometry from detectFace
      let faceDisplay = null;  // currently-interpolated geometry
      const LERP = 0.18;
      function lv(a, b) { return a + (b - a) * LERP; }

      function faceDrawLoop() {
        requestAnimationFrame(faceDrawLoop);
        const ctx = faceCanvas.getContext('2d');

        if (!faceTarget) {
          ctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);
          faceDisplay = null;
          return;
        }

        const { width, height, boxes, landmarks } = faceTarget;
        if (faceCanvas.width !== width)  faceCanvas.width  = width;
        if (faceCanvas.height !== height) faceCanvas.height = height;

        // reset on face-count change
        if (!faceDisplay || faceDisplay.boxes.length !== boxes.length) {
          faceDisplay = {
            boxes:     boxes.map(b => ({ ...b })),
            landmarks: landmarks.map(pts => pts.map(p => ({ ...p })))
          };
        } else {
          faceDisplay.boxes = faceDisplay.boxes.map((d, i) => ({
            x: lv(d.x, boxes[i].x), y: lv(d.y, boxes[i].y),
            w: lv(d.w, boxes[i].w), h: lv(d.h, boxes[i].h),
            label: boxes[i].label
          }));
          faceDisplay.landmarks = faceDisplay.landmarks.map((dPts, i) =>
            dPts.map((dp, j) => ({
              x: lv(dp.x, landmarks[i][j].x),
              y: lv(dp.y, landmarks[i][j].y)
            }))
          );
        }

        ctx.clearRect(0, 0, width, height);

        if (document.getElementById('check-facemesh').checked) {
          ctx.fillStyle = 'rgba(0, 220, 0, 0.85)';
          faceDisplay.landmarks.forEach(pts => {
            pts.forEach(p => {
              ctx.beginPath();
              ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
              ctx.fill();
            });
          });
        }

        if (document.getElementById('check-bbox').checked) {
          faceDisplay.boxes.forEach(box => {
            ctx.strokeStyle = 'lime';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(box.x, box.y, box.w, box.h);
            if (box.label) {
              ctx.font = '12px Tahoma';
              const tw = ctx.measureText(box.label).width;
              ctx.fillStyle = 'rgba(0,0,0,0.6)';
              ctx.fillRect(box.x, box.y - 20, tw + 8, 18);
              ctx.fillStyle = 'lime';
              ctx.fillText(box.label, box.x + 4, box.y - 6);
            }
          });
        }
      }

      // detectFace: runs on interval, updates faceTarget — never touches canvas
      async function detectFace() {
        if (video.readyState < 2) return;

        const { width, height } = video.getBoundingClientRect();
        const results = await faceapi
          .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks(true)
          .withAgeAndGender()
          .withFaceExpressions();

        if (!results.length) { faceTarget = null; return; }

        const resized = faceapi.resizeResults(results, { width, height });

        const showRace    = document.getElementById('check-race').checked;
        const showAge     = document.getElementById('check-age').checked;
        const showGender  = document.getElementById('check-gender').checked;
        const showEmotion = document.getElementById('check-emotion').checked;

        const primary = results[0];
        document.getElementById('result-age').innerHTML    = showAge    ? `<b>${Math.round(primary.age)} y.o.</b>` : '';
        document.getElementById('result-gender').innerHTML = showGender ? `<b>${primary.gender}</b> (${primary.genderProbability.toFixed(2)})` : '';
        const topEmotion = Object.entries(primary.expressions).sort((a, b) => b[1] - a[1])[0];
        document.getElementById('result-emotion').innerHTML = showEmotion ? `<b>${topEmotion[0]}</b> (${topEmotion[1].toFixed(2)})` : '';

        const raceText = showRace
          ? (document.getElementById('result-race').textContent.trim().split(' ')[0] || '')
          : '';

        faceTarget = {
          width, height,
          boxes: resized.map((r, i) => {
            const { x, y, width: w, height: h } = r.detection.box;
            const emotion = Object.entries(r.expressions).sort((a, b) => b[1] - a[1])[0][0];
            const age = Math.round(r.age);
            const ageLabel = age < 13 ? 'a child' : age < 20 ? 'a teenager' :
                             age < 30 ? 'in their mid-twenties' : age < 40 ? 'in their thirties' :
                             age < 50 ? 'in their forties' : age < 65 ? 'in their fifties or sixties' : 'elderly';
            const parts = [];
            if (showEmotion && emotion) parts.push(emotion);
            if (showRace && i === 0 && raceText) parts.push(raceText.toLowerCase());
            if (showGender) parts.push(r.gender);
            if (showAge)    parts.push(ageLabel);
            return { x, y, w, h, label: parts.join(' ') || 'person' };
          }),
          landmarks: resized.map(r => r.landmarks.positions.map(p => ({ x: p.x, y: p.y })))
        };
      }

      async function predictRace() {
        if (video.readyState < 2) return;
        inferCtx.drawImage(video, 0, 0, 224, 224);

        const tensor = tf.browser.fromPixels(inferCanvas)
          .toFloat()
          .div(255.0)
          .expandDims(0);

        const preds = await raceModel.predict(tensor).data();
        tensor.dispose();

        const sorted = [...preds]
          .map((score, i) => ({ cls: RACE_CLASSES[i], score }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 3);

        const parts = sorted.map((p, i) => {
            const label = `${p.cls}&nbsp;(${p.score.toFixed(2)})`;
          return i === 0 ? `<span class="pred-top">${label}</span>` : label;
        });

        document.getElementById('result-race').innerHTML = parts.join(', ');
      }


    const video      = document.getElementById('webcam');
    const bgCanvas   = document.getElementById('bgCanvas');
    const startScreen = document.getElementById('startScreen');
    const errorScreen = document.getElementById('errorScreen');
    const startBtn   = document.getElementById('startBtn');
    const retryBtn   = document.getElementById('retryBtn');
    const dialogueOverlay = document.getElementById('dialogueOverlay');
    const analysisPanel   = document.getElementById('analysisPanel');

    // Small offscreen canvas for encoding (kept tiny — blurhash doesn't need more)
    const encodeCanvas = document.createElement('canvas');
    encodeCanvas.width  = 64;
    encodeCanvas.height = 36;
    const encodeCtx = encodeCanvas.getContext('2d', { willReadFrequently: true });

    // Throttle: re-encode every N ms
    const ENCODE_INTERVAL = 150; // ms
    let lastEncodeTime = 0;
    let rafId = null;

    // Size the bg canvas to fill the screen
    function sizeBgCanvas() {
      bgCanvas.width  = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    sizeBgCanvas();
    window.addEventListener('resize', sizeBgCanvas);

    function renderBlurhash(hash) {
      const w = bgCanvas.width;
      const h = bgCanvas.height;
      // Decode to a small intermediate size, then stretch via canvas drawImage
      const decodeW = 128;
      const decodeH = Math.round(128 * (h / w));
      const pixels = decode(hash, decodeW, decodeH, 1);

      const ctx = bgCanvas.getContext('2d');
      const imageData = ctx.createImageData(decodeW, decodeH);
      imageData.data.set(pixels);

      // Draw decoded pixels to a temp canvas, then stretch to full bg
      const tmp = document.createElement('canvas');
      tmp.width  = decodeW;
      tmp.height = decodeH;
      tmp.getContext('2d').putImageData(imageData, 0, 0);

      ctx.drawImage(tmp, 0, 0, w, h);
    }

    function loop(timestamp) {
      rafId = requestAnimationFrame(loop);

      if (video.readyState < 2) return;

      if (timestamp - lastEncodeTime < ENCODE_INTERVAL) return;
      lastEncodeTime = timestamp;

      // Sample webcam into tiny encode canvas
      encodeCtx.drawImage(video, 0, 0, 64, 36);
      const pixels = encodeCtx.getImageData(0, 0, 64, 36);

      try {
        const hash = encode(pixels.data, 64, 36, 4, 3);
        renderBlurhash(hash);
        if (!bgCanvas.classList.contains('visible')) {
          bgCanvas.classList.add('visible');
        }
      } catch (e) {
        // ignore encode errors on edge frames
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        // Hide start screen, show video + overlays
        startScreen.classList.add('hidden');
        errorScreen.classList.remove('visible');
        video.classList.add('visible');
        dialogueOverlay.classList.add('visible');
        analysisPanel.classList.add('visible');

        // Start the blurhash loop
        if (rafId) cancelAnimationFrame(rafId);
        requestAnimationFrame(loop);

        requestAnimationFrame(faceDrawLoop);
        setInterval(detectFace, 200);

      } catch (err) {
        console.error('Camera error:', err);
        startScreen.classList.add('hidden');
        errorScreen.classList.add('visible');
      }
    }

    startBtn.addEventListener('click', startCamera);
    retryBtn.addEventListener('click', () => {
      errorScreen.classList.remove('visible');
      startScreen.classList.remove('hidden');
    });

    // Race checkbox: start/stop prediction interval
    document.getElementById('check-race').addEventListener('change', function() {
      const row = this.closest('.field-row');
      if (this.checked) {
        row.classList.remove('disabled');
        predictRace();
        raceInterval = setInterval(predictRace, 1000);
      } else {
        row.classList.add('disabled');
        clearInterval(raceInterval);
        document.getElementById('result-race').innerHTML = '';
      }
    });

    // Other checkboxes: just toggle disabled state (no model yet)
    ['check-age', 'check-gender', 'check-emotion'].forEach(id => {
      document.getElementById(id).addEventListener('change', function() {
        this.closest('.field-row').classList.toggle('disabled', !this.checked);
      });
    });

    const keyMap = { r: 'check-race', a: 'check-age', g: 'check-gender', e: 'check-emotion', f: 'check-facemesh', b: 'check-bbox' };
    document.addEventListener('keydown', (ev) => {
      const id = keyMap[ev.key.toLowerCase()];
      if (id) {
        const cb = document.getElementById(id);
        if (cb) {
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        }
      }
    });
</script>

</body>
</html>
