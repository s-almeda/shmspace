<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>recognizing my self</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    /* Blurhash background canvas — full bleed behind window */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      /* scale up slightly so decoded low-res edges don't show */
      transform: scale(1.05);
      image-rendering: pixelated;
      transition: opacity 1.2s ease;
      opacity: 0;
    }

    #bgCanvas.visible {
      opacity: 1;
    }

    .main-window {
      position: relative;
      z-index: 10;
        width: min(98vw, 1200px);
        height: min(96vh, 900px);
      display: flex;
      flex-direction: column;

    }
    #startBtn {
        font-size: 24px;
        padding: 12px 16px;
    }

    .window-body {
      flex: 1;
      padding: 5px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #ede9d8;
      position: relative;
    }

    /* ── Pre-camera state: centered button ── */
    #startScreen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ede9d8;
      z-index: 2;
      transition: opacity 0.6s ease;
    }

    #startScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Webcam ── */
    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #webcam.visible {
      opacity: 1;
    }

    /* ── Error state ── */
    #errorScreen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: #ede9d8;
      color: #aaa;
      font-size: 12px;
      text-align: center;
      padding: 20px;
      z-index: 3;
    }

    #errorScreen.visible {
      display: flex;
    }
    #dialogueOverlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    /*top right bottom left*/
    margin: 0 20px 50px 20px;
    height: 30%;
    z-index: 5;
    background: transparent;
    padding: 0 8px 8px 8px;
    }

    #dialogueOverlay menu[role="tablist"] {
    padding-left: 3px;
    margin-bottom: -2px;
    display: block;
    }
    #dialogueOverlay menu[role="tablist"] button {
        font-size: 35px;
        padding: 6px 18px;
    }

    #dialogueOverlay [role="tabpanel"] {
    background: rrgba(236, 233, 216, 0.85);
    border: 1px solid #888;
    height: calc(100% - 22px);
    padding: 20px 20px;
    overflow-y: auto;
    margin-bottom: 0;
    font-size: 45px;
    line-height: 1.5;
    display: block;
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="window main-window">
    <div class="title-bar" style="height: 50px; padding-right: 15px; padding-left: 15px;">
      <div class="title-bar-text">
        <!-- <img src="./images/question_mark.ico" alt="question mark Logo" style="height: 25px; vertical-align: middle; margin-right: 8px;"> -->
        <span id="titleText" style="font-size: 18px; font-style: italic;">recognizing my self</span>
      </div>

      <div class="title-bar-controls">
        <a href="/"><button aria-label="Close"></button></a>
      </div>
    </div>

    <div class="window-body">
      <!-- always-visible start state -->
      <div id="startScreen">
        <button id="startBtn"> let them see you </button>
      </div>

      <!-- error state -->
      <div id="errorScreen">
        <p>camera access was denied.</p>
        <button id="retryBtn">try again</button>
      </div>

      <!-- webcam feed -->
      <video id="webcam" autoplay playsinline muted></video>
      <div id="dialogueOverlay">
            <menu role="tablist">
                <button role="tab" aria-selected="true" aria-controls="dialogue-panel" contenteditable="true">
                character name
                </button>
            </menu>
            <article role="tabpanel" id="dialogue-panel" contenteditable="true">
                dialogue text goes here...
            </article>
        </div>
    </div>
  </div>

  <script type="module">
    import { encode, decode } from 'https://esm.sh/blurhash@2.0.5';

    const video      = document.getElementById('webcam');
    const bgCanvas   = document.getElementById('bgCanvas');
    const startScreen = document.getElementById('startScreen');
    const errorScreen = document.getElementById('errorScreen');
    const startBtn   = document.getElementById('startBtn');
    const retryBtn   = document.getElementById('retryBtn');

    // Small offscreen canvas for encoding (kept tiny — blurhash doesn't need more)
    const encodeCanvas = document.createElement('canvas');
    encodeCanvas.width  = 64;
    encodeCanvas.height = 36;
    const encodeCtx = encodeCanvas.getContext('2d', { willReadFrequently: true });

    // Throttle: re-encode every N ms
    const ENCODE_INTERVAL = 150; // ms
    let lastEncodeTime = 0;
    let rafId = null;

    // Size the bg canvas to fill the screen
    function sizeBgCanvas() {
      bgCanvas.width  = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    sizeBgCanvas();
    window.addEventListener('resize', sizeBgCanvas);

    function renderBlurhash(hash) {
      const w = bgCanvas.width;
      const h = bgCanvas.height;
      // Decode to a small intermediate size, then stretch via canvas drawImage
      const decodeW = 128;
      const decodeH = Math.round(128 * (h / w));
      const pixels = decode(hash, decodeW, decodeH, 1);

      const ctx = bgCanvas.getContext('2d');
      const imageData = ctx.createImageData(decodeW, decodeH);
      imageData.data.set(pixels);

      // Draw decoded pixels to a temp canvas, then stretch to full bg
      const tmp = document.createElement('canvas');
      tmp.width  = decodeW;
      tmp.height = decodeH;
      tmp.getContext('2d').putImageData(imageData, 0, 0);

      ctx.drawImage(tmp, 0, 0, w, h);
    }

    function loop(timestamp) {
      rafId = requestAnimationFrame(loop);

      if (video.readyState < 2) return;

      if (timestamp - lastEncodeTime < ENCODE_INTERVAL) return;
      lastEncodeTime = timestamp;

      // Sample webcam into tiny encode canvas
      encodeCtx.drawImage(video, 0, 0, 64, 36);
      const pixels = encodeCtx.getImageData(0, 0, 64, 36);

      try {
        const hash = encode(pixels.data, 64, 36, 4, 3);
        renderBlurhash(hash);
        if (!bgCanvas.classList.contains('visible')) {
          bgCanvas.classList.add('visible');
        }
      } catch (e) {
        // ignore encode errors on edge frames
      }
    }

    async function startCamera() {
    
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        // Hide start screen, show video
        startScreen.classList.add('hidden');
        errorScreen.classList.remove('visible');
        video.classList.add('visible');

        // Start the blurhash loop
        if (rafId) cancelAnimationFrame(rafId);
        requestAnimationFrame(loop);

      } catch (err) {
        console.error('Camera error:', err);
        startScreen.classList.add('hidden');
        errorScreen.classList.add('visible');
      }
    }

    startBtn.addEventListener('click', startCamera);
    retryBtn.addEventListener('click', () => {
      errorScreen.classList.remove('visible');
      startScreen.classList.remove('hidden');
    });
  </script>

</body>
</html>
